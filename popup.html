<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLEARLIT</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="header-logo">
        <span class="logo-clear">CLEAR</span><span class="logo-lit">LIT</span>
      </div>
      <div class="header-dot" id="status-dot"></div>
    </div>

    <div class="divider"></div>

    <!-- READING SECTION -->
    <div class="section-label">READING</div>

    <div class="feature-row" id="row-cinematic">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
      </div>
      <div class="feature-text">
        <div class="feature-title">Cinematic mode</div>
        <div class="feature-sub">Distraction-free overlay</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-cinematic" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <div class="row-divider"></div>

    <div class="feature-row" id="row-bionic">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><path d="M12 17v5M8 21h8"/></svg>
      </div>
      <div class="feature-text">
        <div class="feature-title">Bionic reading</div>
        <div class="feature-sub">Bold-first word mode</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-bionic" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <div class="row-divider"></div>

    <div class="feature-row" id="row-tts">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
      <div class="feature-text">
        <div class="feature-title">Text to speech</div>
        <div class="feature-sub">Read full page aloud</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-tts" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>

    <div class="divider" style="margin-top:16px;"></div>

    <!-- AI SUMMARY SECTION -->
    <div class="section-label">AI SUMMARY</div>

    <!-- Mode selector pills -->
    <div class="mode-pills">
      <button class="pill active" data-mode="summary">Summary</button>
      <button class="pill" data-mode="keypoints">Key Points</button>
      <button class="pill" data-mode="simplify">Simplify</button>
    </div>

    <!-- Summary status card -->
    <div class="summary-card" id="summary-card">
      <div class="summary-card-tag">CLAUDE · ANTHROPIC</div>
      <div class="summary-card-text" id="summary-status">Waiting for page content</div>
    </div>

    <!-- Generate button -->
    <button class="generate-btn" id="btn-generate">
      <span id="btn-label">Generate smart summary</span>
      <svg class="generate-arrow" id="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </button>

    <!-- Remove button (hidden until summary exists) -->
    <button class="remove-btn hidden" id="btn-remove">Remove summary</button>

    <div class="divider"></div>

    <!-- Bottom quick actions -->
    <div class="quick-row">
      <button class="quick-btn" id="quick-focus">Focus tunnel</button>
      <button class="quick-btn" id="quick-font">Font size</button>
      <button class="quick-btn settings-btn" id="quick-settings">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
