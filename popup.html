<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Accessibility Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <h2>Accessibility Hub</h2>

  <!-- Text Controls -->
  <button id="increase">Increase Text</button>
  <button id="decrease">Decrease Text</button>

  <select id="fontSelect">
    <option value="">Default Font</option>
    <option value="Arial">Arial</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier New</option>
    <option value="Verdana">Verdana</option>
  </select>

  <!-- Smart Reader Mode -->
  <button id="readerMode">Smart Reading Overlay</button>

  <!-- TTS Controls -->
  <button id="readAll">Read Full Page</button>
  <button id="readSelected">Read Selected Text</button>
  <button id="stopReading">Stop Reading</button>

  <!-- Restore -->
  <button id="restore">Restore Page</button>

  <script src="popup.js"></script>
</body>
</html>
