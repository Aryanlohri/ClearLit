<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CLEARLIT · Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Hide scrollbars globally */
    html, body {
      scrollbar-width: none;
      -ms-overflow-style: none;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #c8c8c8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container { width: 100%; max-width: 440px; }

    .brand {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      margin-bottom: 36px;
    }
    .brand span { color: #444; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #444;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field { margin-bottom: 24px; }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      color: #f0f0f0;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3a3a3a; }

    .hint {
      margin-top: 7px;
      font-size: 11.5px;
      color: #333;
      line-height: 1.5;
    }

    .btn-save {
      width: 100%;
      padding: 13px;
      background: #f0f0f0;
      color: #0a0a0a;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
      letter-spacing: -0.01em;
    }
    .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }

    #status {
      margin-top: 14px;
      font-size: 12.5px;
      text-align: center;
      min-height: 20px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
    }

    .divider {
      height: 1px;
      background: #161616;
      margin: 32px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #111;
    }
    .info-label { font-size: 13px; color: #444; }
    .info-val   { font-family: 'DM Mono', monospace; font-size: 11px; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">CLEAR<span>LIT</span></div>

    <h1>Settings</h1>
    <p class="subtitle">Configure your API key to enable AI-powered summaries via Claude.</p>

    <div class="field">
      <label for="api-key">Anthropic API Key</label>
      <input type="password" id="api-key" placeholder="sk-ant-api03-…" autocomplete="off" />
      <p class="hint">Stored locally in Chrome. Never transmitted anywhere except Anthropic's API.</p>
    </div>

    <button class="btn-save" id="save-btn">Save Settings</button>
    <div id="status"></div>

    <div class="divider"></div>

    <div class="info-row">
      <span class="info-label">Extension version</span>
      <span class="info-val">1.0.0</span>
    </div>
    <div class="info-row">
      <span class="info-label">Model</span>
      <span class="info-val">claude-sonnet-4</span>
    </div>
    <div class="info-row">
      <span class="info-label">API endpoint</span>
      <span class="info-val">api.anthropic.com</span>
    </div>
  </div>

  <script>
    const input  = document.getElementById("api-key");
    const status = document.getElementById("status");

    chrome.storage.sync.get("apiKey", ({ apiKey }) => {
      if (apiKey) input.value = apiKey;
    });

    document.getElementById("save-btn").addEventListener("click", () => {
      const key = input.value.trim();
      if (!key.startsWith("sk-")) {
        status.style.color = "#7f1d1d";
        status.textContent = "⚠ Doesn't look like a valid Anthropic key";
        return;
      }
      chrome.storage.sync.set({ apiKey: key }, () => {
        status.style.color = "#4ade80";
        status.textContent = "✓ Saved";
        setTimeout(() => (status.textContent = ""), 2500);
      });
    });
  </script>
</body>
</html>
